name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  APP_NAME: FreePDFEditor
  BINARY_NAME: pdf-editor
  # Backend endpoints — configure via repository variables or leave empty to disable.
  CRASH_ENDPOINT: ""
  TELEMETRY_ENDPOINT: ""
  UPDATE_SERVER_URL: ""

jobs:
  # ── Extract version, channel, and build number from tag ────────────────────
  version:
    name: Extract Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
      channel: ${{ steps.ver.outputs.channel }}
      build_number: ${{ steps.ver.outputs.build_number }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag and generate release.json
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          python3 scripts/generate_release_json.py "$TAG" "${{ github.run_number }}"

          VERSION=$(python3 -c "import json; d=json.load(open('release/release.json')); print(d['version'])")
          CHANNEL=$(python3 -c "import json; d=json.load(open('release/release.json')); print(d['channel'])")
          BUILD_NUMBER=$(python3 -c "import json; d=json.load(open('release/release.json')); print(d['build_number'])")

          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"       >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          # alpha and beta are pre-releases on GitHub
          if [[ "$CHANNEL" == "stable" ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          fi
          echo "Version: $VERSION, channel: $CHANNEL, build: $BUILD_NUMBER"

      - name: Upload release.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-json
          path: release/release.json
          retention-days: 30

  # ── Validate metadata ───────────────────────────────────────────────────────
  validate-metadata:
    name: Validate Store Metadata
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download release.json
        uses: actions/download-artifact@v4
        with:
          name: release-json
          path: release

      - name: Validate metadata
        run: python3 scripts/validate_metadata.py

  # ── Run tests before releasing ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: version
    env:
      APP_VERSION: ${{ needs.version.outputs.APP_VERSION }}
      APP_CHANNEL: ${{ needs.version.outputs.APP_CHANNEL }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.APP_BUILD_NUMBER }}
      STORE_BUILD: ${{ needs.version.outputs.STORE_BUILD }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcb1-dev

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace

  # ── Windows MSIX build ──────────────────────────────────────────────────────
  build-windows:
    name: Build Windows MSIX
    runs-on: windows-latest
    needs: [validate-metadata, test, version]
    permissions:
      contents: read
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      APP_CHANNEL: ${{ needs.version.outputs.channel }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release.json
        uses: actions/download-artifact@v4
        with:
          name: release-json
          path: release

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-release-

      - name: Build Windows release (reads release/release.json)
        run: pwsh scripts/build_windows.ps1
        env:
          PUBLISHER: ${{ secrets.WINDOWS_PUBLISHER }}
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      - name: Generate SHA256 checksum
        run: |
          $pkg = "dist\windows\$Env:APP_NAME`_$Env:APP_VERSION.msix"
          $hash = (Get-FileHash $pkg -Algorithm SHA256).Hash
          "$hash  $Env:APP_NAME`_$Env:APP_VERSION.msix" | Out-File "dist\windows\$Env:APP_NAME`_$Env:APP_VERSION.msix.sha256"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: |
            dist/windows/${{ env.APP_NAME }}_${{ env.APP_VERSION }}.msix
            dist/windows/${{ env.APP_NAME }}_${{ env.APP_VERSION }}.msix.sha256
          retention-days: 30

  # ── macOS universal binary + signed pkg ────────────────────────────────────
  build-macos:
    name: Build macOS PKG
    runs-on: macos-latest
    needs: [validate-metadata, test, version]
    permissions:
      contents: read
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      APP_CHANNEL: ${{ needs.version.outputs.channel }}
      APP_BUILD_NUMBER: ${{ needs.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release.json
        uses: actions/download-artifact@v4
        with:
          name: release-json
          path: release

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: |
            aarch64-apple-darwin
            x86_64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-release-

      - name: Build universal binary and .app bundle (reads release/release.json)
        run: bash scripts/build_macos.sh
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Notarize and build PKG
        run: bash scripts/notarize_macos.sh
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Generate SHA256 checksum
        run: |
          PKG="dist/macos/${APP_NAME}_${APP_VERSION}.pkg"
          shasum -a 256 "$PKG" > "${PKG}.sha256"

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: |
            dist/macos/${{ env.APP_NAME }}_${{ env.APP_VERSION }}.pkg
            dist/macos/${{ env.APP_NAME }}_${{ env.APP_VERSION }}.pkg.sha256
          retention-days: 30

  # ── TestFlight upload (beta channel only) ───────────────────────────────────
  testflight:
    name: Upload to TestFlight
    runs-on: macos-latest
    needs: [build-macos, version]
    if: needs.version.outputs.channel == 'beta'
    permissions:
      contents: read
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS PKG artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: dist/macos

      - name: Upload to TestFlight via altool
        run: |
          PKG="dist/macos/${APP_NAME}_${APP_VERSION}.pkg"
          # Write the API key to a temp file so it is never passed on the command line.
          KEY_FILE="$TMPDIR/apple_api_key.p8"
          printf '%s' "$APPLE_API_PRIVATE_KEY" > "$KEY_FILE"
          trap 'rm -f "$KEY_FILE"' EXIT
          xcrun altool \
            --upload-package "$PKG" \
            --type osx \
            --apiKey  "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID" \
            --verbose
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}

  # ── Create GitHub Release ───────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, version]
    permissions:
      contents: write
    env:
      APP_VERSION: ${{ needs.version.outputs.version }}
      APP_CHANNEL: ${{ needs.version.outputs.channel }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msix
          path: dist/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: dist/macos

      - name: Download release.json
        uses: actions/download-artifact@v4
        with:
          name: release-json
          path: release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Free PDF Editor ${{ env.APP_VERSION }}"
          draft: false
          prerelease: ${{ needs.version.outputs.prerelease }}
          body: |
            ## Free PDF Editor ${{ env.APP_VERSION }}

            **Channel**: ${{ env.APP_CHANNEL }}

            ### Installation

            **Windows**: Download the `.msix` file and double-click to install via Microsoft Store installer.

            **macOS**: Download the `.pkg` file and run the installer.

            ### Checksums (SHA256)
            See `.sha256` files attached to this release.
          files: |
            dist/windows/${{ env.APP_NAME }}_${{ env.APP_VERSION }}.msix
            dist/windows/${{ env.APP_NAME }}_${{ env.APP_VERSION }}.msix.sha256
            dist/macos/${{ env.APP_NAME }}_${{ env.APP_VERSION }}.pkg
            dist/macos/${{ env.APP_NAME }}_${{ env.APP_VERSION }}.pkg.sha256
            release/release.json

